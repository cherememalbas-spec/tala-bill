<!DOCTYPE html>
<html>
<head>
    <title>Sign In - TALABILL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #b8e1dd 0%, #f7d9d9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 50px;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            color: #217ace;
            text-align: center;
            margin-bottom: 10px;
            font-size: 36px;
        }

        .subtitle {
            text-align: center;
            color: #9ab7d3;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .error {
            background-color: #ffcdd2;
            color: #c62828;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #c62828;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #444;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #217ace;
            box-shadow: 0 0 0 3px rgba(33, 122, 206, 0.1);
        }

        .btn {
            width: 100%;
            background-color: #217ace;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #1a56a0;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(33, 122, 206, 0.3);
        }

        .links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .link {
            text-align: center;
            font-size: 14px;
        }

        .link a {
            color: #217ace;
            text-decoration: none;
            font-weight: bold;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            color: #ccc;
            margin: 20px 0;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 28px;
            }

            .links {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>TALABILL</h1>
        <p class="subtitle">Sign In to Your Account</p>

        <form action="/login" method="POST">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required />
            </div>

            <div class="input-group">
                <input 
                type="password" 
                name="password" 
                placeholder="Enter your password" required
                />
            </div>

            <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="divider">or</div>

        <div class="links">
            <div class="link">
                <a href="/signup">Create Account</a>
           
            </div>
        </div>
    </div>
</body>
</html>
